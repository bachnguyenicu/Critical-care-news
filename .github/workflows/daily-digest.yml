name: Daily critical care digest

on:
  schedule:
    # 22:30 UTC = 05:30 in Vietnam / Asia-Bangkok / Asia-Barnaul time.
    - cron: "30 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build digest.json from PubMed
        env:
          # Optional but recommended by NCBI. Change this to your email.
          NCBI_EMAIL: bachnguyenicu@example.com
        run: |
          python scripts/update_digest.py --output digest.json --history data/covered_pmids.json --archive-dir archive --days 60 --retmax 60
          python -m json.tool digest.json > /tmp/digest.validated.json

      - name: Commit updated digest
        run: |
          git config user.name "critical-care-daily-bot"
          git config user.email "actions@github.com"
          git add digest.json
          if [ -d data ]; then git add data; fi
          if [ -d archive ]; then git add archive; fi
          if git diff --cached --quiet; then
            echo "No digest changes to commit."
          else
            git commit -m "Daily critical care digest $(date -u +%F)"
            git push
          fi
