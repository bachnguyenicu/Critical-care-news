<style>
:root { color-scheme: light; }
* { box-sizing: border-box; }
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:#f6f7f9; color:#1c2530; line-height:1.6; }
.wrap { max-width:820px; margin:0 auto; padding:24px 18px 80px; }
header.top { display:flex; align-items:center; gap:12px; margin-bottom:4px; }
.badge { background:#0b6e6e; color:#fff; font-size:12px; font-weight:700; letter-spacing:.06em; padding:5px 10px; border-radius:999px; text-transform:uppercase; }
h1 { font-size:25px; margin:10px 0 2px; letter-spacing:-.01em; }
.sub { color:#5a6675; font-size:14px; margin:0 0 18px; }
.player { background:#fff; border:1px solid #e3e7ec; border-radius:16px; padding:18px 18px 16px; box-shadow:0 1px 3px rgba(20,30,45,.05); position:sticky; top:8px; z-index:5; }
.player h2 { font-size:14px; text-transform:uppercase; letter-spacing:.07em; color:#0b6e6e; margin:0 0 12px; }
.controls { display:flex; flex-wrap:wrap; align-items:center; gap:10px; }
button.ctrl { border:none; background:#0b6e6e; color:#fff; font-size:15px; font-weight:600; padding:10px 16px; border-radius:10px; cursor:pointer; transition:background .15s; }
button.ctrl:hover { background:#095757; }
button.ctrl.secondary { background:#eef1f4; color:#1c2530; }
button.ctrl.secondary:hover { background:#e1e6ea; }
.selwrap { display:flex; align-items:center; gap:6px; font-size:13px; color:#5a6675; }
select { font-size:13px; padding:7px 8px; border:1px solid #cfd6dd; border-radius:8px; background:#fff; color:#1c2530; }
.progline { height:5px; background:#e9edf1; border-radius:99px; margin-top:14px; overflow:hidden; }
.progfill { height:100%; width:0%; background:#0b6e6e; transition:width .25s; }
.status { font-size:12px; color:#8a95a3; margin-top:8px; }
.transcript { background:#fff; border:1px solid #e3e7ec; border-radius:16px; padding:22px 22px; margin-top:18px; font-size:17px; line-height:1.85; }
.transcript .label { font-size:12px; text-transform:uppercase; letter-spacing:.07em; color:#8a95a3; margin-bottom:10px; }
.sent { transition:background .15s,color .15s; padding:1px 1px; border-radius:4px; }
.sent.active { background:#fde9a7; color:#1c2530; box-shadow:0 0 0 3px #fde9a7; }
.sent.done { color:#7d8896; }
.seg-h { display:block; font-weight:700; color:#0b6e6e; margin:18px 0 4px; font-size:15px; text-transform:uppercase; letter-spacing:.05em; }
.seg-h:first-child { margin-top:0; }
h3.section { margin:32px 0 12px; font-size:16px; text-transform:uppercase; letter-spacing:.06em; color:#5a6675; }
.card { background:#fff; border:1px solid #e3e7ec; border-radius:14px; padding:18px 18px; margin-bottom:14px; }
.card .ti { font-size:18px; font-weight:700; margin:0 0 6px; }
.meta { font-size:13px; color:#5a6675; margin-bottom:10px; }
.meta .tag { display:inline-block; background:#eef1f4; border-radius:6px; padding:2px 8px; margin-right:6px; }
.card p { margin:8px 0; font-size:15px; }
.card .take { background:#f0f7f6; border-left:3px solid #0b6e6e; padding:10px 12px; border-radius:6px; font-size:14.5px; }
.card a { color:#0b6e6e; font-weight:600; text-decoration:none; font-size:14px; }
.card a:hover { text-decoration:underline; }
.foot { text-align:center; color:#9aa4b1; font-size:12px; margin-top:26px; }
.hint { background:#fff7e6; border:1px solid #f2e2b8; border-radius:10px; padding:10px 14px; font-size:13px; color:#7a6515; margin-top:14px; }

<body>
<div class="wrap">
  <header class="top"><span class="badge">Critical Care · Audio</span></header>
  <h1 id="title">Critical Care Daily — Audio Digest</h1>
  <p class="sub" id="subtitle">Loading today's episode…</p>

  <div class="player">
    <h2>🎧 Listening practice</h2>
    <div class="controls">
      <button class="ctrl" id="play">▶ Play</button>
      <button class="ctrl secondary" id="restart">⟲ Restart</button>
      <div class="selwrap">Speed
        <select id="rate">
          <option value="0.8">0.8×</option>
          <option value="0.9">0.9×</option>
          <option value="1" selected>1.0×</option>
          <option value="1.15">1.15×</option>
          <option value="1.3">1.3×</option>
        </select>
      </div>
      <div class="selwrap">Voice <select id="voice"></select></div>
    </div>
    <div class="progline"><div class="progfill" id="prog"></div></div>
    <div class="status" id="status">Loading…</div>
    <div class="hint" id="ttshint" style="display:none">Your browser has no English speech voice available, so audio may not play. The transcript below still works for reading.</div>
  </div>

  <div class="transcript">
    <div class="label">Transcript</div>
    <div id="script"></div>
  </div>

  <h3 class="section">📄 Articles in today's episode</h3>
  <div id="cards"></div>
  <p class="foot" id="foot"></p>
</div>

<script>
const synth = window.speechSynthesis;
const playBtn=document.getElementById('play'), restartBtn=document.getElementById('restart');
const rateSel=document.getElementById('rate'), voiceSel=document.getElementById('voice');
const prog=document.getElementById('prog'), statusEl=document.getElementById('status');
let flatSentences=[], idx=0, playing=false, voices=[];

function render(DIGEST){
  document.getElementById('title').textContent = "Critical Care Daily — " + DIGEST.date;
  document.getElementById('subtitle').textContent = DIGEST.subtitle || "";
  document.getElementById('foot').textContent = "Auto-updates every morning (~5:30 AM). Audio uses your browser's built-in speech.";
  const scriptEl=document.getElementById('script'); scriptEl.innerHTML=''; flatSentences=[];
  DIGEST.script.forEach(seg=>{
    const h=document.createElement('span'); h.className='seg-h'; h.textContent=seg.heading; scriptEl.appendChild(h);
    seg.sentences.forEach(s=>{ const sp=document.createElement('span'); sp.className='sent'; sp.textContent=s+' '; scriptEl.appendChild(sp); flatSentences.push({text:s,span:sp}); });
  });
  const cardsEl=document.getElementById('cards'); cardsEl.innerHTML='';
  DIGEST.articles.forEach(a=>{
    const c=document.createElement('div'); c.className='card';
    c.innerHTML='<div class="ti"></div><div class="meta"><span class="tag"></span><span class="src"></span></div><p class="sum"></p><div class="take"></div><p><a target="_blank" rel="noopener"></a></p>';
    c.querySelector('.ti').textContent=a.title;
    c.querySelector('.tag').textContent=a.type;
    c.querySelector('.src').textContent=a.source+' · '+a.date;
    c.querySelector('.sum').textContent=a.summary;
    c.querySelector('.take').innerHTML='<strong>Take-home:</strong> '+a.analysis;
    const link=c.querySelector('a'); link.href=a.url; link.textContent=(a.urlLabel||'Read source')+' →';
    cardsEl.appendChild(c);
  });
  statusEl.textContent='Press Play to begin. The current sentence is highlighted below — read along to practice.';
  paint();
}
function loadVoices(){
  voices=(synth.getVoices()||[]).filter(v=>/^en(-|_|$)/i.test(v.lang));
  if(!voices.length) voices=synth.getVoices()||[];
  voiceSel.innerHTML='';
  if(!voices.length){ document.getElementById('ttshint').style.display='block'; return; }
  voices.forEach((v,i)=>{ const o=document.createElement('option'); o.value=i; o.textContent=v.name+' ('+v.lang+')'; voiceSel.appendChild(o); });
  const pref=voices.findIndex(v=>/en-US|en_US|United States/i.test(v.lang+v.name)); voiceSel.value=pref>=0?pref:0;
}
if(synth){ loadVoices(); synth.onvoiceschanged=loadVoices; } else { document.getElementById('ttshint').style.display='block'; }
function paint(){ flatSentences.forEach((s,i)=>{ s.span.classList.toggle('active',i===idx&&playing); s.span.classList.toggle('done',i<idx); }); prog.style.width=flatSentences.length?Math.round((idx/flatSentences.length)*100)+'%':'0%'; }
function speakFrom(i){ if(!synth) return; if(i>=flatSentences.length){ stopAll(true); return; } idx=i; paint(); flatSentences[idx].span.scrollIntoView({behavior:'smooth',block:'center'}); const u=new SpeechSynthesisUtterance(flatSentences[idx].text); u.rate=parseFloat(rateSel.value); if(voices.length&&voiceSel.value!=='') u.voice=voices[parseInt(voiceSel.value)]; u.onend=()=>{ if(playing) speakFrom(idx+1); }; u.onerror=()=>{ if(playing) speakFrom(idx+1); }; statusEl.textContent='Now playing — sentence '+(idx+1)+' of '+flatSentences.length; synth.speak(u); }
function play(){ if(!synth){ statusEl.textContent='Speech not supported in this browser.'; return; } if(!flatSentences.length) return; playing=true; playBtn.textContent='⏸ Pause'; if(idx>=flatSentences.length) idx=0; synth.cancel(); speakFrom(idx); }
function pause(){ playing=false; playBtn.textContent='▶ Resume'; synth.cancel(); paint(); statusEl.textContent='Paused at sentence '+(idx+1)+'.'; }
function stopAll(f){ playing=false; synth.cancel(); playBtn.textContent='▶ Play'; if(f){ idx=flatSentences.length; paint(); statusEl.textContent='Episode finished. Press Restart to listen again.'; } }
playBtn.onclick=()=>{ playing?pause():play(); };
restartBtn.onclick=()=>{ synth.cancel(); idx=0; playing=false; playBtn.textContent='▶ Play'; paint(); statusEl.textContent='Reset to the beginning. Press Play.'; };
rateSel.onchange=()=>{ if(playing){ synth.cancel(); speakFrom(idx); } };
voiceSel.onchange=()=>{ if(playing){ synth.cancel(); speakFrom(idx); } };
window.addEventListener('beforeunload',()=>synth&&synth.cancel());

// Load today's content (cache-busted so the phone always gets the latest)
fetch('digest.json?t='+Date.now())
  .then(r=>{ if(!r.ok) throw new Error(r.status); return r.json(); })
  .then(render)
  .catch(e=>{ statusEl.textContent='Could not load today’s content ('+e.message+'). Pull to refresh, or check digest.json.'; });
</script>
</body>
</html>
