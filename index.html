<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Critical Care Daily</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Critical Care">
<meta name="theme-color" content="#0b6e6e">
<link rel="manifest" href='data:application/manifest+json,{"name":"Critical Care Daily","short_name":"Critical Care","display":"standalone","background_color":"%23f6f7f9","theme_color":"%230b6e6e","start_url":"."}'>
<style>
:root { color-scheme: light; --ink:#1b2530; --muted:#5f6b7a; --line:#dfe5eb; --teal:#0b6e6e; --teal2:#eef8f7; --amber:#fff4d7; --blue:#eef5ff; }
* { box-sizing:border-box; }
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:#f6f7f9; color:var(--ink); line-height:1.58; }
.wrap { max-width:920px; margin:0 auto; padding:24px 16px 80px; }
.top { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.badge { background:var(--teal); color:#fff; font-size:12px; font-weight:800; letter-spacing:.06em; padding:5px 10px; border-radius:999px; text-transform:uppercase; }
h1 { font-size:26px; margin:8px 0 2px; letter-spacing:0; }
.sub { color:var(--muted); font-size:14px; margin:0 0 18px; }
.player, .panel, .article { background:#fff; border:1px solid var(--line); border-radius:8px; box-shadow:0 1px 3px rgba(20,30,45,.04); }
.player { padding:16px; position:sticky; top:8px; z-index:5; }
.player h2, .label, .minihead { font-size:12px; text-transform:uppercase; letter-spacing:.07em; color:var(--teal); margin:0 0 10px; font-weight:800; }
.controls { display:flex; flex-wrap:wrap; align-items:center; gap:10px; }
button.ctrl { border:none; background:var(--teal); color:#fff; font-size:15px; font-weight:700; padding:10px 14px; border-radius:8px; cursor:pointer; }
button.secondary { background:#eef1f4; color:var(--ink); }
.selwrap { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--muted); }
select { max-width:260px; font-size:13px; padding:7px 8px; border:1px solid #cfd6dd; border-radius:8px; background:#fff; color:var(--ink); }
.progline { height:5px; background:#e9edf1; border-radius:99px; margin-top:14px; overflow:hidden; }
.progfill { height:100%; width:0%; background:var(--teal); transition:width .25s; }
.status { font-size:12px; color:#7d8896; margin-top:8px; }
.hint { background:var(--amber); border:1px solid #eedb9b; border-radius:8px; padding:10px 12px; font-size:13px; color:#705d16; margin-top:12px; }
.panel { padding:20px; margin-top:16px; }
.transcript { font-size:16.5px; line-height:1.85; }
.sent { transition:background .15s,color .15s; padding:1px; border-radius:4px; }
.sent.active { background:#fde9a7; color:var(--ink); box-shadow:0 0 0 3px #fde9a7; }
.sent.done { color:#7f8a98; }
.seg-h { display:block; font-weight:800; color:var(--teal); margin:18px 0 4px; font-size:14px; text-transform:uppercase; letter-spacing:.05em; }
.seg-h:first-child { margin-top:0; }
h3.section { margin:30px 0 12px; font-size:15px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); }
.article { padding:18px; margin-bottom:16px; }
.title { font-size:19px; font-weight:800; margin:0 0 7px; line-height:1.35; }
.meta { font-size:13px; color:var(--muted); margin-bottom:12px; }
.tag { display:inline-block; background:#eef1f4; border-radius:6px; padding:2px 8px; margin-right:6px; color:#334155; }
.signals { display:flex; flex-wrap:wrap; gap:6px; margin:8px 0 12px; }
.signal { display:inline-block; border:1px solid #c9e5e3; background:var(--teal2); color:#075b5b; border-radius:6px; padding:2px 7px; font-size:12px; font-weight:700; }
.grid { display:grid; gap:10px; }
@media (min-width:760px){ .pico { grid-template-columns:1fr 1fr; } }
.box { border:1px solid var(--line); border-radius:8px; padding:12px; background:#fbfcfd; }
.box strong { display:block; font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-bottom:4px; }
.summary { font-size:15px; margin:10px 0 14px; }
ul { margin:8px 0 0; padding-left:20px; }
li { margin:6px 0; }
.take { background:var(--teal2); border-left:4px solid var(--teal); border-radius:8px; padding:12px; font-size:14.5px; margin-top:12px; }
.english { background:var(--blue); border-color:#d6e7ff; }
.phrase { font-family:ui-monospace,SFMono-Regular,Consolas,"Liberation Mono",monospace; font-size:13px; }
.vocab { display:grid; gap:7px; margin-top:8px; }
.vocab div { display:flex; gap:8px; align-items:flex-start; }
.vocab b { min-width:135px; color:#123a63; }
a { color:var(--teal); font-weight:700; text-decoration:none; }
a:hover { text-decoration:underline; }
.foot { text-align:center; color:#9aa4b1; font-size:12px; margin-top:26px; }
</style>
</head>
<body>
<div class="wrap">
  <header class="top"><span class="badge">Critical Care</span><span class="badge">Journal Club</span></header>
  <h1 id="title">Critical Care Daily</h1>
  <p class="sub" id="subtitle">Loading today's academic digest...</p>

  <div class="player">
    <h2>Quick Listen</h2>
    <div class="controls">
      <button class="ctrl" id="play">Play</button>
      <button class="ctrl secondary" id="restart">Restart</button>
      <div class="selwrap">Speed
        <select id="rate">
          <option value="0.8">0.8x</option>
          <option value="0.9">0.9x</option>
          <option value="1" selected>1.0x</option>
          <option value="1.15">1.15x</option>
          <option value="1.3">1.3x</option>
        </select>
      </div>
      <div class="selwrap">Voice <select id="voice"></select></div>
    </div>
    <div class="progline"><div class="progfill" id="prog"></div></div>
    <div class="status" id="status">Loading...</div>
    <div class="hint" id="ttshint" style="display:none">No English speech voice is available in this browser. The transcript and article notes still work.</div>
  </div>

  <div class="panel transcript">
    <div class="label">Listening Transcript</div>
    <div id="script"></div>
  </div>

  <h3 class="section">Deep Read</h3>
  <div id="cards"></div>
  <p class="foot" id="foot"></p>
</div>

<script>
const synth = window.speechSynthesis;
const playBtn = document.getElementById('play'), restartBtn = document.getElementById('restart');
const rateSel = document.getElementById('rate'), voiceSel = document.getElementById('voice');
const prog = document.getElementById('prog'), statusEl = document.getElementById('status');
let flatSentences = [], idx = 0, playing = false, voices = [];

function el(tag, cls, text){
  const node = document.createElement(tag);
  if(cls) node.className = cls;
  if(text !== undefined) node.textContent = text;
  return node;
}

function list(items){
  const ul = el('ul');
  (items || []).forEach(item => ul.appendChild(el('li', '', item)));
  return ul;
}

function renderPico(card){
  const pico = card.pico || {};
  const wrap = el('div', 'grid pico');
  [['Population', pico.population], ['Intervention / Exposure', pico.intervention], ['Comparator', pico.comparator], ['Outcomes', pico.outcomes]].forEach(([name, value]) => {
    const box = el('div', 'box');
    box.appendChild(el('strong', '', name));
    box.appendChild(el('span', '', value || 'Not clearly stated in the abstract.'));
    wrap.appendChild(box);
  });
  return wrap;
}

function renderEnglish(notes){
  const box = el('div', 'box english');
  box.appendChild(el('strong', '', 'Medical English'));
  const phrases = notes && notes.phrases ? notes.phrases : [];
  phrases.forEach(p => box.appendChild(el('div', 'phrase', p)));
  const vocab = el('div', 'vocab');
  ((notes && notes.vocabulary) || []).forEach(v => {
    const row = el('div');
    row.appendChild(el('b', '', v.term));
    row.appendChild(el('span', '', v.meaning));
    vocab.appendChild(row);
  });
  box.appendChild(vocab);
  if(notes && notes.speakingPrompt){
    const prompt = el('div', 'take');
    prompt.innerHTML = '<strong>Speaking prompt:</strong> ' + notes.speakingPrompt;
    box.appendChild(prompt);
  }
  return box;
}

function render(DIGEST){
  document.getElementById('title').textContent = 'Critical Care Daily - ' + DIGEST.date;
  document.getElementById('subtitle').textContent = DIGEST.subtitle || '';
  document.getElementById('foot').textContent = 'Auto-updates every morning. Verify the source before clinical decisions.';

  const scriptEl = document.getElementById('script');
  scriptEl.innerHTML = '';
  flatSentences = [];
  (DIGEST.script || []).forEach(seg => {
    scriptEl.appendChild(el('span', 'seg-h', seg.heading));
    (seg.sentences || []).forEach(s => {
      const sp = el('span', 'sent', s + ' ');
      scriptEl.appendChild(sp);
      flatSentences.push({text:s, span:sp});
    });
  });

  const cardsEl = document.getElementById('cards');
  cardsEl.innerHTML = '';
  (DIGEST.articles || []).forEach((a, i) => {
    const c = el('article', 'article');
    c.appendChild(el('h2', 'title', (i + 1) + '. ' + a.title));
    const meta = el('div', 'meta');
    meta.appendChild(el('span', 'tag', a.type || 'Article'));
    meta.appendChild(el('span', '', (a.source || 'Source') + ' - ' + (a.date || DIGEST.date)));
    c.appendChild(meta);

    const signals = el('div', 'signals');
    (a.sourceSignals || ['PubMed']).forEach(s => signals.appendChild(el('span', 'signal', s)));
    c.appendChild(signals);

    c.appendChild(el('div', 'minihead', 'Academic Summary'));
    c.appendChild(el('p', 'summary', a.summary || 'No summary available.'));

    c.appendChild(el('div', 'minihead', 'PICO'));
    c.appendChild(renderPico(a));

    c.appendChild(el('div', 'minihead', 'Key Results'));
    c.appendChild(list(a.keyResults || []));

    c.appendChild(el('div', 'minihead', 'Critical Appraisal'));
    c.appendChild(list(a.criticalAppraisal || [a.analysis || 'Read the full text before changing practice.']));

    const take = el('div', 'take');
    take.innerHTML = '<strong>Bedside impact:</strong> ' + (a.practiceImpact || a.analysis || 'Use as a reading prompt.');
    c.appendChild(take);

    c.appendChild(renderEnglish(a.englishNotes || {}));

    const linkp = el('p');
    const link = el('a', '', (a.urlLabel || 'Read source') + ' ->');
    link.href = a.url;
    link.target = '_blank';
    link.rel = 'noopener';
    linkp.appendChild(link);
    c.appendChild(linkp);
    cardsEl.appendChild(c);
  });
  statusEl.textContent = 'Press Play for the short listening version, then read the academic notes below.';
  paint();
}

function loadVoices(){
  voices = (synth.getVoices() || []).filter(v => /^en(-|_|$)/i.test(v.lang));
  if(!voices.length) voices = synth.getVoices() || [];
  voiceSel.innerHTML = '';
  if(!voices.length){ document.getElementById('ttshint').style.display = 'block'; return; }
  voices.forEach((v,i) => {
    const o = document.createElement('option');
    o.value = i;
    o.textContent = v.name + ' (' + v.lang + ')';
    voiceSel.appendChild(o);
  });
  const pref = voices.findIndex(v => /en-US|en_US|United States/i.test(v.lang + v.name));
  voiceSel.value = pref >= 0 ? pref : 0;
}

if(synth){ loadVoices(); synth.onvoiceschanged = loadVoices; } else { document.getElementById('ttshint').style.display = 'block'; }
function paint(){
  flatSentences.forEach((s,i) => {
    s.span.classList.toggle('active', i === idx && playing);
    s.span.classList.toggle('done', i < idx);
  });
  prog.style.width = flatSentences.length ? Math.round((idx / flatSentences.length) * 100) + '%' : '0%';
}
function speakFrom(i){
  if(!synth) return;
  if(i >= flatSentences.length){ stopAll(true); return; }
  idx = i; paint();
  flatSentences[idx].span.scrollIntoView({behavior:'smooth', block:'center'});
  const u = new SpeechSynthesisUtterance(flatSentences[idx].text);
  u.rate = parseFloat(rateSel.value);
  if(voices.length && voiceSel.value !== '') u.voice = voices[parseInt(voiceSel.value)];
  u.onend = () => { if(playing) speakFrom(idx + 1); };
  u.onerror = () => { if(playing) speakFrom(idx + 1); };
  statusEl.textContent = 'Now playing sentence ' + (idx + 1) + ' of ' + flatSentences.length + '.';
  synth.speak(u);
}
function play(){
  if(!synth){ statusEl.textContent = 'Speech is not supported in this browser.'; return; }
  if(!flatSentences.length) return;
  playing = true;
  playBtn.textContent = 'Pause';
  if(idx >= flatSentences.length) idx = 0;
  synth.cancel();
  speakFrom(idx);
}
function pause(){
  playing = false;
  playBtn.textContent = 'Resume';
  synth.cancel();
  paint();
  statusEl.textContent = 'Paused at sentence ' + (idx + 1) + '.';
}
function stopAll(finished){
  playing = false;
  synth.cancel();
  playBtn.textContent = 'Play';
  if(finished){
    idx = flatSentences.length;
    paint();
    statusEl.textContent = 'Listening finished. Press Restart to listen again.';
  }
}
playBtn.onclick = () => { playing ? pause() : play(); };
restartBtn.onclick = () => { synth.cancel(); idx = 0; playing = false; playBtn.textContent = 'Play'; paint(); statusEl.textContent = 'Reset to the beginning.'; };
rateSel.onchange = () => { if(playing){ synth.cancel(); speakFrom(idx); } };
voiceSel.onchange = () => { if(playing){ synth.cancel(); speakFrom(idx); } };
window.addEventListener('beforeunload', () => synth && synth.cancel());

fetch('digest.json?t=' + Date.now())
  .then(r => { if(!r.ok) throw new Error(r.status); return r.json(); })
  .then(render)
  .catch(e => { statusEl.textContent = 'Could not load today\'s content (' + e.message + '). Check digest.json.'; });
</script>
</body>
</html>
